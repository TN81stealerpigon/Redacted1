name: Fluttershy 24/7

on:
  schedule:
    - cron: "*/5 * * * *"  # Runs every 5 minutes
  workflow_dispatch:  # Manual trigger
  push:
    branches: [ main ]

jobs:
  run-fluttershy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          pip install discord.py groq
      
      - name: Run Fluttershy Forever
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          MAIN_API_KEY: ${{ secrets.MAIN_API_KEY }}
          SUMM_API_KEY: ${{ secrets.SUMM_API_KEY }}
        run: |
          while true; do
            python fluttershy_bot.py
            echo "💕 Fluttershy restarting in 10 seconds..."
            sleep 10
          done
      
      - name: Keep alive commit (optional)
        run: |
          git config --global user.name "fluttershy-bot"
          git config --global user.email "fluttershy@users.noreply.github.com"
          date > .fluttershy_heartbeat
          git add .fluttershy_heartbeat
          git diff-index --quiet HEAD || git commit -m "💕 flutter $(date +%s)"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} HEAD:main
        continue-on-error: true
