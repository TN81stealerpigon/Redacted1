name: Full Emergency Purge - Artifacts + Caches + ALL Workflow Runs

on:
  workflow_dispatch:

jobs:
  full-purge:
    runs-on: ubuntu-latest
    permissions:
      actions: write

    steps:
      - name: Delete ALL artifacts
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT }}
          script: |
            console.log("=== Starting Artifact Purge ===");
            let artifacts = await github.paginate(
              github.rest.actions.listArtifactsForRepo,
              { owner: context.repo.owner, repo: context.repo.repo }
            );

            if (artifacts.length === 0) {
              console.log("No artifacts found.");
            } else {
              console.log(`Found ${artifacts.length} artifacts. Deleting...`);
              for (const art of artifacts) {
                console.log(`Deleting: ${art.name} (${art.size_in_bytes} bytes)`);
                try {
                  await github.rest.actions.deleteArtifact({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    artifact_id: art.id
                  });
                } catch (e) {
                  console.log(`Failed ${art.name}: ${e.message}`);
                }
                await new Promise(r => setTimeout(r, 300));
              }
              console.log("All artifacts processed.");
            }

      - name: Delete ALL caches
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}
        run: |
          echo "=== Starting Cache Purge ==="
          CACHE_IDS=$(gh cache list --repo ${{ github.repository }} --limit 1000 --json id -q '.[].id' || echo "")
          if [ -n "$CACHE_IDS" ]; then
            for id in $CACHE_IDS; do
              echo "Deleting cache $id"
              gh cache delete $id --repo ${{ github.repository }} || true
              sleep 0.3
            done
            echo "Caches processed."
          else
            echo "No caches found."
          fi

      - name: Delete ALL workflow runs (clears logs + remaining artifacts)
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}
        run: |
          echo "=== Starting Workflow Run Purge ==="
          echo "This will delete every run (including this one after it finishes)."

          RUN_IDS=$(gh run list --repo ${{ github.repository }} \
            --limit 1000 \
            --json databaseId \
            -q '.[].databaseId' || echo "")

          if [ -z "$RUN_IDS" ]; then
            echo "No runs found."
          else
            COUNT=0
            for id in $RUN_IDS; do
              echo "Deleting run $id"
              gh run delete $id --repo ${{ github.repository }} || echo "Failed (already gone)"
              COUNT=$((COUNT + 1))
              sleep 0.4
            done
            echo "Deleted $COUNT runs."
          fi

          echo "Full purge finished on backend. Refresh Billing page in 6-48 hours."
