name: Emergency Purge All Artifacts

on:
  workflow_dispatch:   # Trigger manually from Actions tab

jobs:
  purge:
    runs-on: ubuntu-latest
    permissions:
      actions: write

    steps:
      - name: Delete ALL artifacts (bulk purge)
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}   # Must have repo scope
        uses: actions/github-script@v7
        with:
          script: |
            console.log("Fetching all artifacts... This may take time if you have hundreds.");

            const artifacts = await github.paginate(
              github.rest.actions.listArtifactsForRepo,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100
              }
            );

            if (artifacts.length === 0) {
              console.log("No artifacts found. Nothing to delete.");
              return;
            }

            console.log(`Found ${artifacts.length} artifacts. Starting deletion...`);

            for (const artifact of artifacts) {
              console.log(`Deleting artifact: ${artifact.name} (ID: ${artifact.id}, Size: ${artifact.size_in_bytes} bytes)`);
              
              try {
                await github.rest.actions.deleteArtifact({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  artifact_id: artifact.id
                });
                console.log(`✓ Deleted ${artifact.name}`);
              } catch (error) {
                console.error(`✗ Failed to delete ${artifact.name}: ${error.message}`);
              }
              
              // Small delay to avoid rate limits
              await new Promise(resolve => setTimeout(resolve, 300));
            }

            console.log("Artifact purge completed! Check usage in a few hours.");
