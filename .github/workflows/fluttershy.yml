name: Fluttershy 24/7

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  run-fluttershy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install discord.py groq

      - name: Kill any old bot processes
        run: |
          pkill -f "python fluttershy_bot.py" || true

      - name: Run Fluttershy
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          MAIN_API_KEY: ${{ secrets.MAIN_API_KEY }}
          SUMM_API_KEY: ${{ secrets.SUMM_API_KEY }}
        run: |
          while true; do
            python fluttershy_bot.py
            echo "💕 Restarting in 10..."
            sleep 10
          done
